<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pro Mind</title>
  <style>
    body { margin: 0; padding: 0; background: #fff; }
  </style>
</head>
<body>
<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630" style="display:block;">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- SOURCE ICONS (left column) -->
  <!-- Vertically centered: 4 icons, each 80px radius circle, spaced evenly across 630px -->
  <!-- y centers: 100, 240, 380, 520 — but let's use 95, 230, 370, 510 for nice spread -->

  <!-- Chrome -->
  <g transform="translate(40, 55)">
    <circle cx="70" cy="70" r="70" fill="#fff" filter="url(#shadow)"/>
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e1/Google_Chrome_icon_%28February_2022%29.svg/960px-Google_Chrome_icon_%28February_2022%29.svg.png" x="21" y="21" width="98" height="98"/>
  </g>

  <!-- X / Twitter -->
  <g transform="translate(40, 195)">
    <circle cx="70" cy="70" r="70" fill="#000" filter="url(#shadow)"/>
    <text x="70" y="91" text-anchor="middle" font-size="56" font-weight="800" fill="#fff" font-family="-apple-system,sans-serif">𝕏</text>
  </g>

  <!-- GitHub -->
  <g transform="translate(40, 335)">
    <circle cx="70" cy="70" r="70" fill="#24292f" filter="url(#shadow)"/>
    <g transform="translate(24,24)" fill="#fff">
      <path d="M46 0C20.6 0 0 20.6 0 46c0 20.3 13.2 37.6 31.4 43.7 2.3.4 3.1-1 3.1-2.2v-8c-12.8 2.8-15.5-6.2-15.5-6.2-2.1-5.3-5.1-6.7-5.1-6.7-4.2-2.9.3-2.8.3-2.8 4.6.3 7 4.6 7 4.6 4.1 7 10.7 5 13.3 3.8.4-3 1.6-5 2.9-6.1-10.2-1.2-20.9-5.1-20.9-22.7 0-5 1.8-9.1 4.6-12.3-.5-1.2-2-5.8.4-12.1 0 0 3.8-1.2 12.4 4.6 3.6-1 7.4-1.5 11.3-1.5 3.9 0 7.8.5 11.3 1.5 8.6-5.8 12.4-4.6 12.4-4.6 2.4 6.3 1 10.9.5 12.1 2.9 3.2 4.6 7.3 4.6 12.3 0 17.6-10.7 21.5-20.9 22.6 1.6 1.4 3.1 4.2 3.1 8.4v12.4c0 1.2.8 2.6 3.1 2.2C78.8 83.6 92 66.3 92 46 92 20.6 71.4 0 46 0z"/>
    </g>
  </g>

  <!-- Internet / Globe -->
  <g transform="translate(40, 475)">
    <circle cx="70" cy="70" r="70" fill="#f0f4ff" filter="url(#shadow)"/>
    <circle cx="70" cy="70" r="38" fill="none" stroke="#333" stroke-width="3.5"/>
    <ellipse cx="70" cy="70" rx="17" ry="38" fill="none" stroke="#333" stroke-width="3"/>
    <line x1="32" y1="70" x2="108" y2="70" stroke="#333" stroke-width="3"/>
    <line x1="38" y1="48" x2="102" y2="48" stroke="#333" stroke-width="2"/>
    <line x1="38" y1="92" x2="102" y2="92" stroke="#333" stroke-width="2"/>
  </g>

  <!-- FLOW LINES: sources → brain (brain center at ~600,315) -->
  <line x1="180" y1="125" x2="488" y2="305" stroke="#ccc" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="265" x2="488" y2="310" stroke="#ccc" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="405" x2="488" y2="318" stroke="#ccc" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="545" x2="488" y2="325" stroke="#ccc" stroke-width="2" opacity="0.7"/>

  <!-- BRAIN (center) -->
  <g transform="translate(488, 224)">
    <circle cx="90" cy="90" r="90" fill="#000" filter="url(#shadow)"/>
    <image href="/favicon-96x96.png" x="30" y="30" width="120" height="120"/>
    <text x="90" y="208" text-anchor="middle" font-size="22" font-weight="600" fill="#111" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Pro Mind</text>
  </g>

  <!-- FLOW LINE: brain → chat -->
  <line x1="668" y1="315" x2="780" y2="315" stroke="#ccc" stroke-width="2" opacity="0.7"/>

  <!-- CHAT (right) -->
  <g transform="translate(780, 195)">
    <rect x="0" y="0" width="370" height="240" rx="36" fill="#000" filter="url(#shadow)"/>
    <!-- Chat bubbles / lines -->
    <rect x="40" y="44" width="180" height="18" rx="9" fill="rgba(255,255,255,0.9)"/>
    <rect x="40" y="76" width="120" height="18" rx="9" fill="rgba(255,255,255,0.5)"/>
    <rect x="40" y="118" width="210" height="18" rx="9" fill="rgba(255,255,255,0.9)"/>
    <rect x="40" y="150" width="100" height="18" rx="9" fill="rgba(255,255,255,0.5)"/>
    <rect x="40" y="192" width="150" height="18" rx="9" fill="rgba(255,255,255,0.3)"/>
    <text x="185" y="278" text-anchor="middle" font-size="20" font-weight="500" fill="#666" font-family="-apple-system, BlinkMacSystemFont, sans-serif">Ask Anything</text>
  </g>

</svg>
</body>
</html>
